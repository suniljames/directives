# Agent Types, Providers & Assignments
#
# Single source of truth for:
#   - Abstract agent types (builder, validator, etc.)
#   - LLM providers and their capabilities
#   - Default provider-to-agent-type assignments
#
# Orchestrators read this file to route work to the right provider.
# Projects can override assignments in their CONTRIBUTING.md.

agent_types:
  - id: builder
    description: "Creates work — implements, produces, deploys"
    capabilities:
      - create_deliverables
      - verify_quality
      - publish
      - integrate

  - id: validator
    description: "Reviews work — audits, checks quality, flags issues"
    capabilities:
      - review_work
      - write_specifications
      - file_findings

providers:
  - id: claude-code
    name: Claude Code
    binary: claude
    strengths:
      - content_creation
      - iterative_refinement
      - tool_use
      - delivery

  - id: gemini-cli
    name: Gemini CLI
    binary: gemini
    strengths:
      - analysis
      - review
      - specification
      - documentation

# Default: which provider backs each agent type.
# Orchestrators use this unless the project overrides.
# fallback_order: if preferred provider is unavailable, try the next.
assignments:
  default:
    builder: claude-code
    validator: gemini-cli
  fallback_order:
    builder:
      - claude-code
    validator:
      - gemini-cli
      - claude-code
